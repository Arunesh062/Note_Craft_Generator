<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- THE FLOATING WIDGET -->
  <div id="nc-widget">
    
    <!-- HEADER / DRAG HANDLE -->
    <div class="nc-header" id="nc-drag-handle">
      <div class="nc-logo-group">
        <div class="nc-dot"></div>
        <span class="nc-title">NoteCraft AI</span>
      </div>
      <div class="nc-actions">
        <button class="nc-action-btn" id="nc-minimize" title="Minimize">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </div>

    <!-- MINIMIZED BUBBLE CONTENT -->
    <div class="nc-bubble-content" id="nc-bubble">
      <div class="nc-pulse"></div>
      <div class="nc-dot" style="width: 16px; height: 16px;"></div>
      <div class="nc-bubble-timer" id="bubble-timer">00:00</div>
    </div>

    <!-- MAIN WINDOW CONTENT -->
    <div id="nc-main-body">
      
      <!-- STATE: IDLE -->
      <div id="state-idle" class="nc-content active">
        <div style="text-align: center; padding: 10px 0;">
          <p class="nc-status">Ready to capture your meeting insights.</p>
          <button id="btn-start" class="nc-btn nc-btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg>
            Start Recording
          </button>
        </div>
      </div>

      <!-- STATE: RECORDING -->
      <div id="state-recording" class="nc-content">
        <div style="text-align: center;">
          <div class="nc-recording-badge">
            <span class="nc-dot" style="background: var(--danger); width: 6px; height: 6px;"></span>
            Live Recording
          </div>
          <div id="timer" class="nc-timer">00:00:00</div>
          <button id="btn-stop" class="nc-btn nc-btn-danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
            Stop Meeting
          </button>
        </div>
      </div>

      <!-- STATE: PROCESSING -->
      <div id="state-processing" class="nc-content">
        <div style="text-align: center;">
          <p class="nc-title" id="processing-text">Orchestrating Notes</p>
          <div class="nc-progress-container">
            <div class="nc-progress-bar"></div>
          </div>
          <p class="nc-status" style="font-size: 11px;">Synthesizing AI insights from audio...</p>
        </div>
      </div>

      <!-- STATE: READY -->
      <div id="state-ready" class="nc-content">
        <div style="text-align: center;">
          <div class="nc-dot" style="background: var(--success); width: 40px; height: 40px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <p class="nc-title" style="color: white; margin-bottom: 5px;">Notes are Ready!</p>
          <p class="nc-status">Download your professional summary.</p>
          <a id="btn-docx" class="nc-btn nc-btn-success" target="_blank" style="text-decoration: none;">
            Download DOCX
          </a>
          <button id="btn-new" class="nc-btn nc-btn-danger" style="background: transparent; margin-top: 5px;">
            Start New Session
          </button>
        </div>
      </div>

      <!-- STATE: ERROR -->
      <div id="state-error" class="nc-content">
        <div style="text-align: center;">
          <p class="nc-title" style="color: var(--danger);">Something went wrong</p>
          <p class="nc-status">We couldn't process the notes.</p>
          <button id="btn-retry" class="nc-btn nc-btn-primary">Try Again</button>
          <button id="btn-new-error" class="nc-btn nc-btn-danger" style="background: transparent;">Reset</button>
        </div>
      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
